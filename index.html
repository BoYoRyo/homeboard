<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeBoard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- 時計 -->
    <div id="clock-block">
      <div id="clock">
        <span id="clock-h">--</span>
        <span id="clock-m">--</span>
      </div>
    </div>

    <!-- 日付 -->
    <div id="date-block">
      <span id="date-display">--月--日 (-)</span>
    </div>

    <!-- 天気（今日のみ）-->
    <div id="weather-block">
      <div id="weather-left">
        <span id="weather-icon">--</span>
        <div id="weather-desc">
          <span id="weather-label">--</span>
          <span id="weather-precip">--%</span>
        </div>
      </div>
      <div id="weather-vsep"></div>
      <div id="weather-right">
        <span id="weather-current-temp">--°</span>
        <div id="weather-minmax-stack">
          <span id="weather-max">↑--°</span>
          <span id="weather-min">↓--°</span>
        </div>
      </div>
    </div>

    <!-- 月間カレンダー -->
    <div id="calendar-block">
      <div id="cal-header">
        <span id="cal-year-month"></span>
      </div>
      <div id="cal-grid"></div>
      <div id="cal-holiday-list"></div>
    </div>

    <!-- 予定 -->
    <div id="schedule-block">
      <div id="allday-list"></div>
      <div id="schedule-divider"></div>
      <div id="timed-list"></div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
